name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal necesita ambos targets
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Tauri system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev \
            build-essential curl wget file libssl-dev libayatana-appindicator3-dev

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # Cuerpo del release = sección del CHANGELOG para este tag (vX.Y.Z).
      # `shell: bash` y `cat`/`awk` funcionan en los tres runners.
      - name: Extraer notas del CHANGELOG
        id: notes
        shell: bash
        run: |
          notes=$(awk -v tag="$GITHUB_REF_NAME" '
            index($0, "## " tag) == 1 { grab = 1; next }
            grab && /^## v/ { exit }
            grab { print }
          ' CHANGELOG.md)
          # Respaldo si el tag no tiene sección en el CHANGELOG.
          if [ -z "$(printf '%s' "$notes" | tr -d '[:space:]')" ]; then
            notes="Ver los assets para descargar la versión de tu plataforma."
          fi
          {
            echo "body<<__NOTES_EOF__"
            echo "$notes"
            echo "__NOTES_EOF__"
          } >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Firma de los artefactos del updater (latest.json + .sig)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'iureditor ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
